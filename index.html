<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>C.A.M.S. Authentication</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f2f2f7; }
    .glass-card { background: rgba(255, 255, 255, 0.9); padding: 35px 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; border: 1px solid rgba(255,255,255,0.6); backdrop-filter: blur(10px); min-width: 250px; }
    .spinner { border: 4px solid rgba(88, 86, 214, 0.15); border-top: 4px solid #5856D6; border-radius: 50%; width: 42px; height: 42px; animation: spin 1s linear infinite; margin: 0 auto 18px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    h3 { color: #1d1d1f; margin: 0 0 6px 0; font-size: 1.15rem; font-weight: 600; letter-spacing: 0.3px; }
    p { color: #8e8e93; margin: 0; font-size: 0.9rem; letter-spacing: 0.2px; }
    .error-icon { font-size: 40px; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>

  <div class="glass-card">
    <div class="error-icon" id="errorIcon">⚠️</div>
    <div class="spinner" id="loadingSpinner"></div>
    <h3 id="statusText">กำลังเข้าสู่ระบบ...</h3>
    <p id="subText">C.A.M.S. Secure Login</p>
  </div>

  <script>
    const MY_LIFF_ID = "2009641216-P1ououZt"; 
    const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbxq9oWCvXjfK7iKvmxruOXN82stmesr6ToZ5ZTKHPGFL2Uk2zLhQlW3FKzvOvRSCDF3/exec";

    async function initializeLiff() {
      const statusText = document.getElementById("statusText");
      const subText = document.getElementById("subText");
      const spinner = document.getElementById("loadingSpinner");
      const errorIcon = document.getElementById("errorIcon");

      try {
        await liff.init({ liffId: MY_LIFF_ID });
        
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          window.location.href = MY_GAS_URL + "?page=teacher&uid=" + profile.userId;
        } else {
          statusText.innerText = "กำลังเชื่อมต่อกับ LINE...";
          liff.login();
        }
      } catch (err) {
        console.error("LIFF Init Error:", err);
        spinner.style.display = "none"; // ซ่อนตัวหมุน
        errorIcon.style.display = "block"; // โชว์ไอคอนเตือน
        statusText.innerText = "ไม่สามารถเชื่อมต่อได้";
        statusText.style.color = "#FF3B30";
        subText.innerText = "กรุณาลองใหม่อีกครั้ง หรือติดต่อผู้ดูแลระบบ";
      }
    }

    initializeLiff();
  </script>

</body>
</html>
